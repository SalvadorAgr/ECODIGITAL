<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
</head>
<body style="margin: 0; padding: 0; background-color: #09090b; color: #fafafa; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; display: flex; min-height: 100vh; align-items: center; justify-content: center; overflow: hidden;">
    
    <!-- Empty component equivalent -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center; max-width: 28rem; width: 100%; padding: 3rem; border-radius: 0.75rem;">
        
        <!-- EmptyHeader component equivalent -->
        <div style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            
            <!-- EmptyMedia variant="icon" component equivalent (Stacked Effect) -->
            <div style="position: relative; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center;">
                <!-- Card 1 (bottom left) -->
                <div style="position: absolute; bottom: 0; width: 2.25rem; height: 2.25rem; border-radius: 0.375rem; border: 1px solid #27272a; background-color: #09090b; transform: translateX(-0.125rem) scale(0.84) rotate(-10deg); opacity: 0.5;"></div>
                <!-- Card 2 (bottom right) -->
                <div style="position: absolute; bottom: 0; width: 2.25rem; height: 2.25rem; border-radius: 0.375rem; border: 1px solid #27272a; background-color: #09090b; transform: translateX(0.125rem) scale(0.84) rotate(10deg); opacity: 0.5;"></div>
                <!-- Card 3 (Main Center) -->
                <div style="position: relative; width: 2.25rem; height: 2.25rem; border-radius: 0.375rem; border: 1px solid #27272a; background-color: #09090b; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); z-index: 10;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; width: 4rem; height: 4rem;">
                        <path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/>
                    </svg>
                </div>
            </div>

            <!-- EmptyTitle component equivalent -->
            <h1 style="font-size: 2.25rem; line-height: 2.5rem; font-weight: 700; background-image: linear-gradient(to right, #fafafa, rgba(250, 250, 250, 0.8), #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 0;">
                404
            </h1>

            <!-- EmptyDescription component equivalent -->
            <p style="font-size: 1.125rem; line-height: 1.75; color: #a1a1aa; margin: 0.25rem 0 0 0;">
                The page you’re looking for doesn’t exist. It may have been moved or deleted.
            </p>
        </div>

        <!-- EmptyContent component equivalent -->
        <div style="display: flex; width: 100%; flex-direction: column; align-items: center; gap: 1rem;">
            <div style="display: flex; flex-direction: row; gap: 0.75rem; align-items: center; justify-content: center;">
                <!-- Go Home Button (Primary) -->
                <a href="http://localhost:3001/" style="display: inline-flex; align-items: center; justify-content: center; height: 2.25rem; padding: 0 1rem; background-color: #fafafa; color: #09090b; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 500; text-decoration: none; cursor: pointer; gap: 0.5rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Go Home
                </a>

                <!-- Go Back Button (Outline) -->
                <button onclick="window.history.back()" style="display: inline-flex; align-items: center; justify-content: center; height: 2.25rem; padding: 0 1rem; background-color: transparent; color: #fafafa; border-radius: 0.5rem; border: 1px solid #27272a; font-size: 0.875rem; font-weight: 500; text-decoration: none; cursor: pointer; gap: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
                    </svg>
                    Go Back
                </button>
            </div>
        </div>
    </div>
</body>
</html>
