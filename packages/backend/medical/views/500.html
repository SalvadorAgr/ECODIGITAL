<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
</head>
<body style="margin: 0; padding: 0; background-color: #09090b; color: #fafafa; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh; align-items: center; justify-content: center;">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center; max-width: 28rem; padding: 3rem;">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div style="width: 2.25rem; height: 2.25rem; border-radius: 0.375rem; border: 1px solid #27272a; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>
                </svg>
            </div>
            <h1 style="font-size: 2.25rem; line-height: 2.5rem; font-weight: 700; background-image: linear-gradient(to right, #dc2626, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 0;">500</h1>
            <p style="font-size: 1.125rem; line-height: 1.75; color: #a1a1aa; margin: 0.25rem 0 0 0;">Something went wrong on our end. Please try again later.</p>
        </div>
        <div style="display: flex; gap: 0.75rem;">
            <button onclick="window.location.reload()" style="display: inline-flex; align-items: center; height: 2.25rem; padding: 0 1rem; background-color: #fafafa; color: #09090b; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 500; cursor: pointer;">Try Again</button>
            <a href="http://localhost:3001/" style="display: inline-flex; align-items: center; height: 2.25rem; padding: 0 1rem; border: 1px solid #27272a; color: #fafafa; border-radius: 0.5rem; text-decoration: none; font-size: 0.875rem; font-weight: 500;">Go Home</a>
        </div>
    </div>
</body>
</html>
